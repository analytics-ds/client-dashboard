name: Build & Deploy Dashboard

on:
  schedule:
    # Tous les jours a 7h00 UTC (9h Paris ete, 8h hiver)
    - cron: '0 7 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/build.yml'
      - 'package.json'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build dashboard
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          # Un refresh token par compte Google (cf. src/clients.js > ACCOUNTS)
          GOOGLE_REFRESH_TOKEN_PIERRE: ${{ secrets.GOOGLE_REFRESH_TOKEN_PIERRE }}
          GOOGLE_REFRESH_TOKEN_DATASHAKE: ${{ secrets.GOOGLE_REFRESH_TOKEN_DATASHAKE }}
          GOOGLE_REFRESH_TOKEN_UPEARLY: ${{ secrets.GOOGLE_REFRESH_TOKEN_UPEARLY }}
          # Mot de passe qui protege/dechiffre le dashboard
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
